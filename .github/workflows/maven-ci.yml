name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Unit Tests (Fast)
      # Run only Surefire tests (excludes *IT.java)
      if: github.event_name == 'pull_request'
      run: mvn -B -ntp test --file backend/pom.xml

    - name: Full Verification (Slow - Integration Tests)
      # Run everything (unit + integration) only on push to main or specific triggers
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: mvn -B -ntp verify --file backend/pom.xml

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-and-failsafe-reports
        path: |
          backend/target/surefire-reports/
          backend/target/failsafe-reports/