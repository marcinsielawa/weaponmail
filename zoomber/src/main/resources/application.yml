logging:
  level:
    com.weaponmail.stream: DEBUG

spring:

  # --─ Virtual Threads (Java 25 / Spring Boot 4) ─────────────────────────────
  # Enables virtual threads for ALL blocking work:
  #   - @KafkaListener containers  ← key for InboxStreamService
  #   - any remaining servlet/blocking code paths
  # WebFlux's event loop is unaffected — it already uses Netty's NIO threads.
  threads:
    virtual:
      enabled: true

  # ── ScyllaDB / Cassandra ───────────────────────────────────────────────────
  cassandra:
    keyspace-name: weaponmail
    contact-points:
      - localhost:9045
    local-datacenter: datacenter1
    schema-action: create_if_not_exists
    request:
      timeout: 10s
    connection:
      connect-timeout: 10s
      init-query-timeout: 10s
