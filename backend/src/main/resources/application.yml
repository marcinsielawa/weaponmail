logging:
  level:
    com.weaponmail.stream: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus # Expose prometheus for scraping
  otlp:
    metrics:
      export:
        # PUSH to the Docker port you exposed
        url: http://127.0.0.1:4318/v1/metrics 
        step: 5s # Faster updates for load testing
        enabled: true # Ensure it's not disabled by a profile
  metrics:
    export:
      otlp:
        enabled: true
    distribution:
      percentiles-histogram:
        # REQUIRED to see the "Saturation Hockey Stick" in Grafana
        http.server.requests: true 
  tracing:
    sampling:
      probability: 1.0 # Capture 100% of traces for testing (don't do this in high-scale prod!)

spring:

  # --─ Virtual Threads (Java 25 / Spring Boot 4) ─────────────────────────────
  # Enables virtual threads for ALL blocking work:
  #   - @KafkaListener containers  ← key for InboxStreamService
  #   - any remaining servlet/blocking code paths
  # WebFlux's event loop is unaffected — it already uses Netty's NIO threads.
  threads:
    virtual:
      enabled: true

  # ── ScyllaDB / Cassandra ───────────────────────────────────────────────────
  cassandra:
    keyspace-name: weaponmail
    contact-points:
      - 127.0.0.1:9042
    local-datacenter: datacenter1
    schema-action: create_if_not_exists
    request:
      timeout: 10s
    connection:
      connect-timeout: 10s
      init-query-timeout: 10s

  kafka:
    bootstrap-servers: localhost:9092  # PLAINTEXT_HOST listener (Mac → Docker port mapping)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

    consumer:
      group-id: weaponmail-sse-group
      auto-offset-reset: earliest         # SSE only needs new events, not historical replay
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.weaponmail.*"
        spring.json.value.default.type: "com.weaponmail.message.event.InboxEvent"

# ── WeaponMail app config ────────────────────────────────────────────────────
weaponmail:
  kafka:
    topics:
      inbox-events: inbox.events